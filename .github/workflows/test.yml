name: Tests

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test
